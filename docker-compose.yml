services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ragpoc
      POSTGRES_USER: ragpoc
      POSTGRES_PASSWORD: ragpoc
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragpoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ragpoc:ragpoc@db:5432/ragpoc
      FASTEMBED_CACHE_DIR: /fastembed-cache
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - fastembed-cache:/fastembed-cache
    stdin_open: true
    tty: true

volumes:
  fastembed-cache:
